name: urban-mci-command-center
version: "1.0.0"
description: "Urban Mass Casualty Incident Command Environment."

tasks:
  - id: task_1
    name: "Easy - 40 Victims"
    difficulty: easy
    description: "Small incident with 40 victims, 8 ambulances, 2 hospitals"
  - id: task_2
    name: "Medium - 120 Victims"
    difficulty: medium
    description: "Mid-scale incident with secondary collapse at step 30"
  - id: task_3
    name: "Hard - 240 Victims"
    difficulty: hard
    description: "Large incident with road blockage, media pressure, secondary collapse"

endpoints:
  reset: POST /reset
  step: POST /step
  state: GET /state
  grade: GET /grade

environment:
  max_steps: 120
  default_task: 1

grading:
  function: grade
  formula: "lives_saved / saveable_victims"

tags:
  - openenv
  - emergency-response
  - healthcare

metadata:
  domain: "Emergency Response"
  license: MIT
